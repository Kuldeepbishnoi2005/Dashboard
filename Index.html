<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Count Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      background: #ffffff;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 700px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.75rem;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #111;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      background: #111;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-icon svg {
      width: 20px;
      height: 20px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Serial count — large top row */
    .serial-row {
      background: #111;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .serial-row .label {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 4px;
    }

    .serial-row .count {
      font-size: 36px;
      font-weight: 600;
      color: #fff;
      line-height: 1;
    }

    /* Category grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 1.25rem;
    }

    .card {
      background: #fafafa;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 1rem 1.25rem;
    }

    .card .label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .card .count {
      font-size: 30px;
      font-weight: 600;
      color: #111;
      line-height: 1;
      margin-bottom: 12px;
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 8px;
    }

    .btn {
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      transition: background 0.12s, border-color 0.12s;
      line-height: 1;
    }

    .btn-inc:hover { background: #e6f4ea; border-color: #4caf50; color: #2e7d32; }
    .btn-dec:hover { background: #fdecea; border-color: #ef5350; color: #c62828; }

    .serial-row .btn {
      background: #222;
      border-color: #444;
      color: #fff;
    }
    .serial-row .btn-inc:hover { background: #2e7d32; border-color: #4caf50; }
    .serial-row .btn-dec:hover { background: #c62828; border-color: #ef5350; }

    /* Total */
    .total-row {
      background: #f0f0f0;
      border-radius: 12px;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .total-row .total-label {
      font-size: 15px;
      color: #555;
      font-weight: 500;
    }

    .total-row .total-val {
      font-size: 36px;
      font-weight: 700;
      color: #111;
    }

    /* Reset */
    .reset-btn {
      width: 100%;
      padding: 11px;
      border-radius: 10px;
      border: 1px solid #ddd;
      background: #fff;
      color: #c62828;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.12s;
    }

    .reset-btn:hover { background: #fdecea; }

    .reset-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr 1fr; }
      body { padding: 1rem 0.5rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    </div>
    <h1>Stock Count Dashboard</h1>
  </div>

  <!-- Serial Count -->
  <div class="serial-row">
    <div>
      <div class="label">Serial count</div>
      <div class="count" id="serial-val">0</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-dec" onclick="change('serial', -1)">−</button>
      <button class="btn btn-inc" onclick="change('serial', 1)">+</button>
    </div>
  </div>

  <!-- Category Cards -->
  <div class="grid">
    <div class="card">
      <div class="label">Damage</div>
      <div class="count" id="damage-val">0</div>
      <div class="btn-row">
        <button class="btn btn-dec" onclick="change('damage', -1)">−</button>
        <button class="btn btn-inc" onclick="change('damage', 1)">+</button>
      </div>
    </div>
    <div class="card">
      <div class="label">No Plate</div>
      <div class="count" id="noplate-val">0</div>
      <div class="btn-row">
        <button class="btn btn-dec" onclick="change('noplate', -1)">−</button>
        <button class="btn btn-inc" onclick="change('noplate', 1)">+</button>
      </div>
    </div>
    <div class="card">
      <div class="label">No Ring</div>
      <div class="count" id="noring-val">0</div>
      <div class="btn-row">
        <button class="btn btn-dec" onclick="change('noring', -1)">−</button>
        <button class="btn btn-inc" onclick="change('noring', 1)">+</button>
      </div>
    </div>
    <div class="card">
      <div class="label">No P/R</div>
      <div class="count" id="nopr-val">0</div>
      <div class="btn-row">
        <button class="btn btn-dec" onclick="change('nopr', -1)">−</button>
        <button class="btn btn-inc" onclick="change('nopr', 1)">+</button>
      </div>
    </div>
    <div class="card">
      <div class="label">Damage / Ring</div>
      <div class="count" id="dmgring-val">0</div>
      <div class="btn-row">
        <button class="btn btn-dec" onclick="change('dmgring', -1)">−</button>
        <button class="btn btn-inc" onclick="change('dmgring', 1)">+</button>
      </div>
    </div>
    <div class="card">
      <div class="label">Damage / Plate / Ring</div>
      <div class="count" id="dmgall-val">0</div>
      <div class="btn-row">
        <button class="btn btn-dec" onclick="change('dmgall', -1)">−</button>
        <button class="btn btn-inc" onclick="change('dmgall', 1)">+</button>
      </div>
    </div>
  </div>

  <!-- Total -->
  <div class="total-row">
    <span class="total-label">Total Stock</span>
    <span class="total-val" id="total-val">0</span>
  </div>

  <!-- Reset -->
  <button class="reset-btn" onclick="resetAll()">
    <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    Reset all
  </button>
</div>

<script>
  const fields = ['serial', 'damage', 'noplate', 'noring', 'nopr', 'dmgring', 'dmgall'];
  const counts = {};
  fields.forEach(f => counts[f] = 0);

  function change(field, delta) {
    counts[field] = Math.max(0, counts[field] + delta);
    document.getElementById(field + '-val').textContent = counts[field];
    updateTotal();
  }

  function updateTotal() {
    const total = fields.reduce((sum, f) => sum + counts[f], 0);
    document.getElementById('total-val').textContent = total;
  }

  function resetAll() {
    if (!confirm('Sab counts zero ho jayenge. Sure ho?')) return;
    fields.forEach(f => {
      counts[f] = 0;
      document.getElementById(f + '-val').textContent = '0';
    });
    document.getElementById('total-val').textContent = '0';
  }
</script>

</body>
</html>
